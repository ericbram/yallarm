[platformio]
; `pio run` without -e builds only the device firmware. Run unit tests with
; `pio test -e native`.
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.7.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
    tzapu/WiFiManager @ ^2.0.17

board_build.filesystem = littlefs
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

extra_scripts = pre:scripts/prepare_data.py
build_flags = -std=gnu++2a
; Uncomment to boot into the LED hardware-diagnostic loop (skips WiFi/web/audio).
; Phase 1: 8s of color bands  (0-19 red | 20-39 grn | 40-59 blu | 60-79 wht | 80-99 yel | 100-119 mag)
; Phase 2: marching single pixel with [diag] pixel N over serial.
;build_flags = -std=gnu++2a -DLED_DIAG

; Native environment — runs unit tests on the host machine (no hardware needed).
; Only the pure calc headers are compiled; hardware-dependent src/ files are excluded.
[env:native]
platform = native
build_src_filter = -<*>
test_framework = unity
build_flags = -std=c++17
