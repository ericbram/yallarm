name: Release

on:
  release:
    types: [published]

jobs:
  build-firmware:
    name: Build Firmware (ESP32-S3)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-esp32-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            .pio/build/esp32-s3-devkitc-1/firmware.bin \
            .pio/build/esp32-s3-devkitc-1/partitions.bin \
            .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            --clobber
